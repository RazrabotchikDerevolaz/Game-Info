<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Сайт на GitHub Pages</title>
    <style>
        /* Базовые стили для обнуления отступов */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Контейнер главной карточки */
        .container {
            text-align: center;
            background: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #24292e; /* Цвет в стиле GitHub */
            margin-bottom: 15px;
            font-size: 2.5rem;
        }

        p {
            color: #586069;
            margin-bottom: 25px;
            font-size: 1.1rem;
        }

        /* Стильная кнопка */
        .btn {
            display: inline-block;
            background-color: #2ea44f; /* Зеленый цвет GitHub */
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s ease;
        }

        .btn:hover {
            background-color: #2c974b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Привет, Мир! 👋</h1>
        <p>Мой первый сайт успешно запущен и работает на бесплатном хостинге <strong>GitHub Pages</strong>.</p>
        <a href="https://github.com" target="_blank" class="btn">Открыть мой GitHub</a>
    </div>

</body>
</html>
